<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="keywords"
      content="Komari-Theme-LuminaPlus-Mod, LuminaPlus, server monitor, real-time server status, server performance dashboard, monitoring tool" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Komari-Theme-LuminaPlus-Mod" />
    <meta property="og:title" content="Komari-Theme-LuminaPlus-Mod" />
    <meta property="og:description" content="A Komari monitor theme." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Komari-Theme-LuminaPlus-Mod" />
    <meta name="twitter:description" content="A Komari monitor theme." />
    <title>Komari-Theme-LuminaPlus-Mod</title>
    <meta name="description" content="A Komari monitor theme." />
    <script>
      (() => {
        const parseAppearance = (value) => {
          if (value == null) return null;
          try {
            const parsed = JSON.parse(value);
            if (parsed === "system" || parsed === "light" || parsed === "dark") {
              return parsed;
            }
          } catch {
            if (value === "system" || value === "light" || value === "dark") {
              return value;
            }
          }
          return null;
        };

        let appearance = "system";
        try {
          const explicitAppearance = parseAppearance(localStorage.getItem("appearance"));
          const cachedDefaultAppearance = parseAppearance(
            localStorage.getItem("appearance_default"),
          );
          if (explicitAppearance != null) {
            appearance = explicitAppearance;
            localStorage.setItem("appearance", JSON.stringify(explicitAppearance));
          } else if (cachedDefaultAppearance != null) {
            appearance = cachedDefaultAppearance;
            localStorage.setItem(
              "appearance_default",
              JSON.stringify(cachedDefaultAppearance),
            );
          }
        } catch {
          appearance = "system";
        }
        const resolved =
          appearance === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : appearance;
        document.documentElement.dataset.appearance = resolved;
        document.documentElement.style.colorScheme = resolved;
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = resolved === "dark" ? "#020f0f" : "#fbfbf6";

        // Apply the cached custom background + card transparency before first
        // paint so a refresh doesn't flash the solid theme before React mounts.
        // Mirror of applyBackgroundCache() in src/utils/background.ts.
        // 防御层:strip 可能逃逸 CSS value 上下文的控制字符和特殊字符。
        // background.ts 保存时已做同样清理,这里只做纵深防御。
        const sanitizeCssVal = function (val) {
          return typeof val === "string"
            ? val.replace(/[\x00-\x1f\x7f"'`()<>\\\s]/g, "")
            : "";
        };
        try {
          const rawBg = localStorage.getItem("luminaplusmod:bg");
          if (rawBg) {
            const bg = JSON.parse(rawBg);
            if (bg && bg.v === 1) {
              const dark = resolved === "dark";
              const desktop = sanitizeCssVal(dark ? bg.darkDesktop : bg.lightDesktop) || "none";
              const mobile = sanitizeCssVal(dark ? bg.darkMobile : bg.lightMobile) || desktop;
              const style = document.documentElement.style;
              style.setProperty("--bg-image-desktop", desktop);
              style.setProperty("--bg-image-mobile", mobile);
              style.setProperty("--bg-size", sanitizeCssVal(bg.size) || "cover");
              style.setProperty("--bg-position", sanitizeCssVal(bg.position) || "center");
              style.setProperty("--surface-alpha", sanitizeCssVal(bg.alpha) || "100");
              if (bg.blur) {
                style.setProperty("--surface-blur", sanitizeCssVal(bg.blur));
                document.documentElement.dataset.bgGlass = "true";
              }
              if (bg.scrim) style.setProperty("--bg-scrim", sanitizeCssVal(bg.scrim));
            }
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root" class="relative z-30"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
